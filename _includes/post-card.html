<a href="{% if post.link %}{{ post.link }}{% else %}{{ site.baseurl }}{{ post.url }}{% endif %}" {% if post.link %}target="_blank" rel="noopener"{% endif %} class="reveal">
  <div class="card" style="height:100%; display:flex; flex-direction:column;">
    {% if post.video %}
      <div class="video-thumb">
        <img class="thumb" src="{{ post.thumbnail | relative_url }}" alt="{{ post.title }}">
        <video class="hover-video" muted playsinline preload="none" loop>
          <source src="{{ post.video | relative_url }}" type="video/mp4">
        </video>
      </div>
    {% elsif post.image %}
      <div style="height:200px; overflow:hidden; position:relative;">
        <img src="{{ post.image | relative_url }}" alt="{{ post.title }}"
             style="object-fit:cover; width:100%; height:100%; display:block; transition:transform .4s;">
      </div>
    {% else %}
      <header class="card-header">
        <div class="card-header-title">{{ post.title }}</div>
      </header>
    {% endif %}

    <div class="card-content" style="flex-grow:1; display:flex; flex-direction:column;">
      <div class="content" style="flex-grow:1;">
        <div class="card-title-box">
          <p class="title is-6">{{ post.title }}</p>
        </div>
        {% if post.description %}
        <div class="card-description-box">
          <p class="is-size-7">{{ post.description }}</p>
        </div>
        {% endif %}
      </div>
    </div>

    <footer class="card-footer">
      <p class="card-footer-item">{{ post.date | date: "%b %-d, %Y" }}</p>
    </footer>
  </div>
</a>
