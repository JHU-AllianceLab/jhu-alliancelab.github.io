<section
  class="hero {% if page.hero_height %}{{ page.hero_height }}{% elsif layout.hero_height %}{{ layout.hero_height }}{% else %}is-small{% endif %} is-bold is-primary"
  {% if page.hero_image %}style="background: url('{{ page.hero_image }}') no-repeat center center; background-size: cover;"{% endif %}
>
  <div class="hero-body">
    <div class="container">
      <div style="display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;">
        {% if page.hero_image %}
        <figure style="width: 90px; height: 90px; border-radius: 50%; overflow: hidden; border: 3px solid rgba(104,172,229,.5); flex-shrink: 0;">
          <img src="{{ page.hero_image }}" alt="{{ page.title }}" style="width:100%;height:100%;object-fit:cover;object-position:center top;">
        </figure>
        {% endif %}
        <div>
          <p class="title is-2" style="margin-bottom: .25rem;">{{ page.title }}</p>
          <p class="subtitle is-4">{{ page.job_title }}</p>
          {% if page.hero_link %}
          <a href="{{ page.hero_link | prepend: site.baseurl }}" class="button is-info">{{ page.hero_link_text }}</a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>
