<article class="media event-card reveal">
  <figure class="media-left">
    <p class="image is-96x96" style="border-radius: 8px; overflow: hidden; border: 2px solid var(--jhu-spirit-pale);">
      <img src="{{ include.event.image | absolute_url }}" alt="{{ include.event.title }}" style="object-fit: cover; width: 100%; height: 100%;">
    </p>
  </figure>
  <div class="media-content">
    <p>
      <strong style="color: var(--jhu-blue);">
        <a href="{{ include.event.link }}" style="color: var(--jhu-blue-mid);">{{ include.event.title }}</a>
      </strong><br>
      <span style="color: var(--text-mid); font-size: .9rem;">{{ include.event.description }}</span>
    </p>
  </div>
  <div class="media-right">
    <p class="is-size-7" style="font-family: 'Source Code Pro', monospace; color: var(--muted); white-space: nowrap;">
      {{ include.event.date | date: "%b %-d, %Y" }}
    </p>
  </div>
</article>
